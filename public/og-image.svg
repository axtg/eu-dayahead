<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#1F2937" stroke-width="1" opacity="0.6">
    <line x1="0" y1="158" x2="1200" y2="158"/>
    <line x1="0" y1="316" x2="1200" y2="316"/>
    <line x1="0" y1="474" x2="1200" y2="474"/>
  </g>

  <!-- chart silhouette -->
  <path d="M60 470 L160 430 L260 460 L360 380 L460 410 L560 320 L660 360 L760 240 L860 290 L960 200 L1060 260 L1140 220"
        fill="none" stroke="url(#line)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M60 470 L160 430 L260 460 L360 380 L460 410 L560 320 L660 360 L760 240 L860 290 L960 200 L1060 260 L1140 220 L1140 560 L60 560 Z"
        fill="url(#line)" opacity="0.12"/>

  <!-- logo mark -->
  <g transform="translate(72,72)">
    <rect width="64" height="64" rx="14" fill="url(#accent)"/>
    <path d="M36 12L18 38h10l-2 16 22-30H36l2-12z" fill="#0B1220"/>
  </g>

  <!-- title -->
  <text x="160" y="118" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="36" font-weight="600" fill="#E5E7EB" letter-spacing="-0.5">dap.xadi.eu</text>

  <!-- headline -->
  <text x="72" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="76" font-weight="700" fill="#F9FAFB" letter-spacing="-2">EU day-ahead</text>
  <text x="72" y="318" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="76" font-weight="700" fill="#F9FAFB" letter-spacing="-2">electricity prices</text>

  <!-- subtitle -->
  <text x="72" y="378" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="28" font-weight="400" fill="#9CA3AF">Live hourly prices &amp; free REST API · 9 EU markets</text>

  <!-- country chips -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" font-size="22" fill="#E5E7EB">
    <g transform="translate(72,540)">
      <rect width="72" height="44" rx="10" fill="#1F2937"/>
      <text x="36" y="29" text-anchor="middle">NL</text>
    </g>
    <g transform="translate(156,540)">
      <rect width="72" height="44" rx="10" fill="#1F2937"/>
      <text x="36" y="29" text-anchor="middle">DE</text>
    </g>
    <g transform="translate(240,540)">
      <rect width="72" height="44" rx="10" fill="#1F2937"/>
      <text x="36" y="29" text-anchor="middle">BE</text>
    </g>
    <g transform="translate(324,540)">
      <rect width="72" height="44" rx="10" fill="#1F2937"/>
      <text x="36" y="29" text-anchor="middle">FR</text>
    </g>
    <g transform="translate(408,540)">
      <rect width="72" height="44" rx="10" fill="#1F2937"/>
      <text x="36" y="29" text-anchor="middle">AT</text>
    </g>
    <g transform="translate(492,540)">
      <rect width="72" height="44" rx="10" fill="#1F2937"/>
      <text x="36" y="29" text-anchor="middle">CH</text>
    </g>
    <g transform="translate(576,540)">
      <rect width="72" height="44" rx="10" fill="#1F2937"/>
      <text x="36" y="29" text-anchor="middle">DK</text>
    </g>
    <g transform="translate(660,540)">
      <rect width="72" height="44" rx="10" fill="#1F2937"/>
      <text x="36" y="29" text-anchor="middle">NO</text>
    </g>
    <g transform="translate(744,540)">
      <rect width="72" height="44" rx="10" fill="#1F2937"/>
      <text x="36" y="29" text-anchor="middle">SE</text>
    </g>
  </g>
</svg>
